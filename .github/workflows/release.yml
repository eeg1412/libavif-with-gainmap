name: build and publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  js:
    name: test js
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm test

  build-native:
    name: build ${{ matrix.key }}
    needs: js
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: linux-x64
            os: ubuntu-24.04
          - key: linux-arm64
            os: ubuntu-24.04-arm
          - key: darwin-x64
            os: macos-15-intel
          - key: darwin-arm64
            os: macos-15
          - key: win32-x64
            os: windows-2025
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install build tools on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build nasm pkg-config

      - name: Install build tools on macOS
        if: runner.os == 'macOS'
        run: |
          brew untap aws/tap || true
          brew install cmake nasm ninja pkg-config

      - name: Install build tools on Windows
        if: runner.os == 'Windows'
        run: choco install ninja nasm -y

      - run: npm test

      - name: Build libavif tools
        run: npm run build:libavif
        env:
          TARGET_PLATFORM_KEY: ${{ matrix.key }}

      - name: Check current platform binaries
        run: npm run check-prebuilt
        env:
          TARGET_PLATFORM_KEY: ${{ matrix.key }}

      - name: Upload native binaries
        uses: actions/upload-artifact@v7
        with:
          name: vendor-${{ matrix.key }}
          path: vendor/${{ matrix.key }}
          if-no-files-found: error

  pack:
    name: pack npm tarball
    needs: build-native
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download native artifacts
        uses: actions/download-artifact@v8
        with:
          path: vendor-artifacts

      - name: Assemble vendor directory
        run: |
          mkdir -p vendor
          for dir in vendor-artifacts/vendor-*; do
            key="${dir##*/vendor-}"
            mkdir -p "vendor/$key"
            cp -R "$dir/." "vendor/$key/"
          done

      - run: npm test
      - run: npm run check-prebuilt:all

      - name: Create package
        run: npm pack

      - name: Upload npm package
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: '*.tgz'
          if-no-files-found: error

  publish:
    name: publish npm
    if: startsWith(github.ref, 'refs/tags/')
    needs: pack
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: .

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish
        run: npm publish ./*.tgz --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
